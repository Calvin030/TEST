<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂即時互動系統</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 40px auto; text-align: center; }
        h1, h2 { color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #3498db; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        .hidden { display: none; }
        .teacher-container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .group-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid #3498db; }
        .group-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        .group-content { min-height: 80px; white-space: pre-wrap; word-break: break-all; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 6px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="view-role" class="card">
        <h1>課堂即時回答系統</h1>
        <p>請選擇你的身分：</p>
        <button onclick="switchView('student-1')" style="margin-bottom: 15px;">我是學生 (進入回答)</button>
        <button onclick="initTeacher()" style="background-color: #2ecc71;">我是老師 (查看結果)</button>
    </div>

    <div id="view-student-1" class="card hidden">
        <h2>請選擇你的組別</h2>
        <select id="student-group">
            <option value="第一組">第一組</option>
            <option value="第二組">第二組</option>
            <option value="第三組">第三組</option>
            <option value="第四組">第四組</option>
            <option value="第五組">第五組</option>
            <option value="第六組">第六組</option>
        </select>
        <button onclick="goToStudentStep2()">下一步</button>
    </div>

    <div id="view-student-2" class="card hidden">
        <h2 id="display-group-name">第 X 組</h2>
        <p>請在下方輸入你們的答案或想法：</p>
        <textarea id="student-text" rows="5" placeholder="在此輸入文字..."></textarea>
        <button onclick="submitAnswer()" style="background-color: #e67e22;">提交答案</button>
        <p id="submit-status" style="color: green; margin-top: 10px;"></p>
    </div>

    <div id="view-teacher" class="teacher-container hidden">
        <div class="card" style="max-width: 400px; margin: 20px auto;">
            <h2>學生掃描 QR Code 連接</h2>
            <div id="qrcode"></div>
            <button onclick="clearAllData()" style="background-color: #e74c3c; margin-top: 10px;">清空所有組別數據</button>
            <button onclick="location.reload()" style="background-color: #95a5a6; margin-top: 10px;">返回主頁</button>
        </div>
        <h2>📊 各組即時畫面</h2>
        <div id="teacher-grid" class="grid"></div>
    </div>

    <script>
        // Firebase 精確設定網址
        const firebaseConfig = {
            databaseURL: "https://test-c6cab-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        
        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentGroup = "";

        // 畫面切換
        function switchView(viewId) {
            document.getElementById('view-role').classList.add('hidden');
            document.getElementById('view-student-1').classList.add('hidden');
            document.getElementById('view-student-2').classList.add('hidden');
            document.getElementById('view-teacher').classList.add('hidden');
            document.getElementById('view-' + viewId).classList.remove('hidden');
        }

        // 學生選好組別，進入下一頁
        function goToStudentStep2() {
            currentGroup = document.getElementById('student-group').value;
            document.getElementById('display-group-name').innerText = currentGroup;
            switchView('student-2');
            document.getElementById('student-text').value = ""; // 清空框框，讓學生重新輸入新內容
        }

        // 學生提交答案（已修改為：自動換行追加、保留舊答案、成功後清空框框）
        function submitAnswer() {
            const text = document.getElementById('student-text').value;
            const statusText = document.getElementById('submit-status');
            
            // 檢查如果沒打字就不讓他們送出
            if (!text.trim()) {
                statusText.innerText = "⚠️ 請先輸入文字再提交！";
                statusText.style.color = "red";
                return;
            }

            statusText.innerText = "正在儲存...";
            statusText.style.color = "orange";
            
            // 1. 先去雲端撈出這一組原本就有的答案
            database.ref('classroom/' + currentGroup).once('value').then((snapshot) => {
                let finalOldText = "";
                if (snapshot.exists()) {
                    finalOldText = snapshot.val();
                }
                
                // 2. 如果之前已經有答案，就「換行追加」在後面；沒有就直接等於新答案
                let updatedText = text;
                if (finalOldText !== "") {
                    updatedText = finalOldText + "\n" + text;
                }
                
                // 3. 把合併後的大字串更新回 Firebase 資料庫
                return database.ref('classroom/' + currentGroup).set(updatedText);
            })
            .then(() => {
                statusText.innerText = "✅ 提交成功！已追加到老師畫面。";
                statusText.style.color = "green";
                document.getElementById('student-text').value = ""; // 成功後自動清空手機輸入框，方便回答下一題
                setTimeout(() => { statusText.innerText = ""; }, 3000);
            })
            .catch((error) => {
                statusText.innerText = "❌ 失敗: " + error.message;
                statusText.style.color = "red";
            });
        }

        // 老師端初始化
        function initTeacher() {
            switchView('teacher');
            document.getElementById("qrcode").innerHTML = ""; 
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 180, height: 180 });

            // 即時同步監聽
            database.ref('classroom').on('value', (snapshot) => {
                const grid = document.getElementById('teacher-grid');
                grid.innerHTML = ""; 
                const data = snapshot.val() || {};
                
                for(let i = 1; i <= 6; i++) {
                    const groupName = `第${getChineseNumber(i)}組`;
                    const content = data[groupName] || "（目前沒有輸入內容）";
                    grid.innerHTML += `
                        <div class="group-card">
                            <div class="group-title">${groupName}</div>
                            <div class="group-content">${escapeHtml(content)}</div>
                        </div>`;
                }
            });
        }

        // 清空所有組別數據
        function clearAllData() {
            if(confirm("確定要清空所有組別的答案嗎？")) { 
                database.ref('classroom').remove(); 
            }
        }

        function getChineseNumber(num) {
            return ["零", "一", "二", "三", "四", "五", "六"][num];
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
